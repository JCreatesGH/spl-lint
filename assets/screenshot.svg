<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" font-family="SFMono-Regular,Consolas,Menlo,monospace">
  <rect width="800" height="400" rx="10" fill="#11111b"/>
  <rect width="800" height="34" rx="10" fill="#313244"/><rect y="20" width="800" height="14" fill="#313244"/>
  <circle cx="20" cy="17" r="6" fill="#f38ba8"/><circle cx="40" cy="17" r="6" fill="#f9e2af"/><circle cx="60" cy="17" r="6" fill="#a6e3a1"/>
  <text x="400" y="22" fill="#bac2de" font-size="12" text-anchor="middle">spllint</text>
  <text font-size="13" xml:space="preserve">
    <tspan x="18" y="64" fill="#a6e3a1">$ </tspan><tspan fill="#cdd6f4">spllint 'status=500 | join id [search index=db] | transaction session'</tspan>
    <tspan x="18" y="92" fill="#6c7086"># formatted:</tspan>
    <tspan x="18" y="112" fill="#94e2d5">status=500</tspan>
    <tspan x="18" y="130" fill="#cdd6f4">| </tspan><tspan fill="#94e2d5">join id [search index=db]</tspan>
    <tspan x="18" y="148" fill="#cdd6f4">| </tspan><tspan fill="#94e2d5">transaction session</tspan>
  </text>
  <rect x="18" y="166" width="764" height="170" rx="8" fill="#181825"/>
  <text font-size="12.5" xml:space="preserve">
    <tspan x="34" y="192" fill="#f38ba8">  HIGH   [stage 0] no-index: Search has no index= — it will scan all indexes.</tspan>
    <tspan x="34" y="214" fill="#f38ba8">  HIGH   [stage 1] join: `join` is expensive and capped at 50k rows —</tspan>
    <tspan x="58" y="232" fill="#f38ba8">prefer `stats` by a key.</tspan>
    <tspan x="34" y="256" fill="#f9e2af">  MEDIUM [stage 2] transaction: memory-heavy — prefer `stats`/`streamstats`.</tspan>
    <tspan x="34" y="280" fill="#89dceb">  LOW    [stage 0] no-sourcetype: Consider adding sourcetype= to narrow.</tspan>
    <tspan x="34" y="304" fill="#89dceb">  LOW    [stage 2] no-field-trim: add `fields`/`table` to trim columns.</tspan>
    <tspan x="34" y="326" fill="#6c7086"># exits non-zero on HIGH → gate dashboards/saved searches in CI</tspan>
  </text>
  <text x="18" y="368" font-size="12.5" fill="#a6e3a1">✓ 8 tests · top-level pipe split (quotes &amp; subsearches safe) · formatter + linter</text>
  <text x="18" y="390" font-size="12" fill="#6c7086">rules: index-wildcard · leading-wildcard · tstats hint · unbounded sort · …</text>
</svg>
